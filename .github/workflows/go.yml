# go.yml v2
# CI for goCF: format/vet/staticcheck/tests via tools/check.sh

name: Go CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  ci:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        # v5 release exists; GitHub Marketplace page may still show v4 in places.
        # See releases for v5. :contentReference[oaicite:2]{index=2}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          check-latest: true

      - name: Show Go version
        run: go version

      - name: CI checks (gofmt/vet/staticcheck/tests)
        run: ./tools/check.sh

      - name: Tests (no cache)
        run: go test -count=1 ./...
# eof go.yml v2